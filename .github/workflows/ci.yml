name: CI
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Test core
        run: npm test --workspace core
      - name: Build core
        run: npm run build --workspace core
      - name: Compile extension
        run: npm run compile --workspace vscode-extension
      - name: Validate plugin/marketplace manifests
        run: node -e "require('./.claude-plugin/marketplace.json'); require('./claude-plugin/.claude-plugin/plugin.json'); console.log('manifests ok')"
      - name: Check hook script syntax
        run: bash -n vscode-extension/hook/lumi-hook.sh
