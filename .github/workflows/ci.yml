name: CI
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Terminal backend availability (non-fatal)
        continue-on-error: true
        run: |
          node -e "try { require('node-pty'); console.log('node-pty available'); } catch (e) { console.log('node-pty unavailable (optional) -', e.message); }"
      - name: Test core
        run: npm test --workspace core
      - name: Build core
        run: npm run build --workspace core
      - name: Validate plugin/marketplace manifests
        run: node -e "require('./.claude-plugin/marketplace.json'); require('./claude-plugin/.claude-plugin/plugin.json'); console.log('manifests ok')"
