name: Desktop Release (Windows)
on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:
jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Install root deps
        run: npm install
      - name: Install desktop-overlay deps
        run: npm install
        working-directory: desktop-overlay
      - name: Build installer (sidecar + NSIS)
        run: npm run dist:win
        working-directory: desktop-overlay
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumi-windows-installer
          path: desktop-overlay/src-tauri/target/release/bundle/nsis/*-setup.exe
      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-overlay/src-tauri/target/release/bundle/nsis/*-setup.exe
