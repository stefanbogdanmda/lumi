<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1200" height="630" viewBox="0 0 1200 630" role="img"
     aria-label="Lumi progress card: 12 concepts learned">

  <!-- Defs: gradient + glow filters -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070A18"/>
      <stop offset="100%" stop-color="#141A44"/>
    </linearGradient>
    <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFC56B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFC56B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative top-right arc -->
  <circle cx="1200" cy="0" r="380" fill="none" stroke="#2E3980" stroke-width="1" opacity="0.4"/>
  <circle cx="1200" cy="0" r="260" fill="none" stroke="#2E3980" stroke-width="1" opacity="0.25"/>

  <!-- Spark / glow dot -->
  <circle cx="80" cy="80" r="40" fill="url(#sparkGlow)" opacity="0.55"/>
  <circle cx="80" cy="80" r="6" fill="#FFC56B" filter="url(#glow)"/>

  <!-- Wordmark -->
  <text x="102" y="86"
        font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="22" font-weight="700" fill="#FFC56B" letter-spacing="2">Lumi</text>

  <!-- Headline line 1 -->
  <text x="600" y="215"
        font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="72" font-weight="800" fill="#FFFFFF"
        text-anchor="middle" dominant-baseline="auto"
        letter-spacing="-1">I learned 12 concepts</text>

  <!-- Headline line 2 -->
  <text x="600" y="305"
        font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="72" font-weight="800" fill="#FFC56B"
        text-anchor="middle" letter-spacing="-1">with Lumi</text>

  <!-- Level badge -->
  <rect x="490" y="340" width="220" height="38" rx="19" ry="19"
        fill="#1E245A" stroke="#2E3980" stroke-width="1.5"/>
  <text x="600" y="364"
        font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="16" font-weight="600" fill="#8891CC"
        text-anchor="middle">Level: growing</text>

  <!-- Flame icon + streak -->
  
  <g transform="translate(730, 358)" filter="url(#glow)">
    <path d="M0-11c1 4-1 7 2 9-1-3 1-5 3-4-2 2-1 6 2 7-1-2 0-4 2-4 2 3 0 7-3 9 4-1 6-5 4-9 2 2 2 5 0 8 3-2 4-7 1-11-1 3-3 4-4 3 2-3 0-7-4-8 1 2 0 4-2 4 1-2 1-5-1-4z" fill="#FFC56B" transform="scale(0.85)"/>
  </g>
  <text x="750" y="364"
        font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="15" font-weight="600" fill="#FFC56B"
        text-anchor="start">12-day streak</text>

  <!-- Concept chips -->
  
  <text x="600" y="422"
        font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="13" fill="#8891CC"
        text-anchor="middle" letter-spacing="1">RECENT CONCEPTS</text>
  
    <rect x="123" y="440" width="283" height="34"
          rx="17" ry="17"
          fill="#1E245A" stroke="#2E3980" stroke-width="1"/>
    <text x="264.5" y="461.9"
          font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
          font-size="14" fill="#FFC56B" text-anchor="middle">ORM (object-relational mapper)</text>
    <rect x="416" y="440" width="113" height="34"
          rx="17" ry="17"
          fill="#1E245A" stroke="#2E3980" stroke-width="1"/>
    <text x="472.5" y="461.9"
          font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
          font-size="14" fill="#FFC56B" text-anchor="middle">Middleware</text>
    <rect x="539" y="440" width="198" height="34"
          rx="17" ry="17"
          fill="#1E245A" stroke="#2E3980" stroke-width="1"/>
    <text x="638" y="461.9"
          font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
          font-size="14" fill="#FFC56B" text-anchor="middle">API endpoint / route</text>
    <rect x="747" y="440" width="173" height="34"
          rx="17" ry="17"
          fill="#1E245A" stroke="#2E3980" stroke-width="1"/>
    <text x="833.5" y="461.9"
          font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
          font-size="14" fill="#FFC56B" text-anchor="middle">Asynchronous code</text>
    <rect x="930" y="440" width="147" height="34"
          rx="17" ry="17"
          fill="#1E245A" stroke="#2E3980" stroke-width="1"/>
    <text x="1003.5" y="461.9"
          font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
          font-size="14" fill="#FFC56B" text-anchor="middle">Race condition</text>

  <!-- Footer separator -->
  <line x1="80" y1="558" x2="1120" y2="558"
        stroke="#2E3980" stroke-width="1" opacity="0.6"/>

  <!-- Footer text -->
  <text x="600" y="590"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="15" fill="#8891CC"
        text-anchor="middle" letter-spacing="0.5">Made with Lumi — npm i -g @lumi/core</text>

</svg>