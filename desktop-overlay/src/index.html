<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumi</title>
  <!-- No-JS fallback: try the overlay directly. -->
  <noscript><meta http-equiv="refresh" content="0; url=http://localhost:4321/" /></noscript>
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #1a1411; /* espresso */
      color: #f3e9dd;      /* cream */
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
    }
    .wrap { padding: 24px; max-width: 320px; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #e8a13a; /* amber */
      margin: 0 auto 16px;
      box-shadow: 0 0 18px 4px rgba(232, 161, 58, 0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }
    p { font-size: 13px; line-height: 1.5; opacity: 0.8; }
    code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { .dot { animation: none; opacity: .8; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="dot"></div>
    <p id="status">Starting Lumi&hellip;</p>
    <p id="hint" style="opacity:.5; font-size:12px;">
      Waiting for <code>lumi serve</code> on <code>localhost:4321</code>
    </p>
  </div>

  <script>
    // The native shell (Tauri) starts `lumi serve` and only reveals this window
    // once the port answers, so the overlay is usually ready immediately. This
    // poll is a safety net for cold starts and for running index.html directly.
    var URL = "http://localhost:4321/";
    var status = document.getElementById("status");

    function go() { window.location.replace(URL); }

    function probe() {
      // `no-cors` lets us detect reachability without reading the (cross-port)
      // response. A resolved promise means the server accepted the connection.
      fetch(URL, { mode: "no-cors", cache: "no-store" })
        .then(go)
        .catch(function () { setTimeout(probe, 500); });
    }

    probe();
  </script>
</body>
</html>
